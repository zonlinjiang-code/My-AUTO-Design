<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>图文自动排版工具</title>
  <style>
    @font-face {
      font-family: "Inter";
      src: url("./fonts/Inter/Inter-var-2.ttf") format("truetype");
      font-weight: 100 900;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: "Noto Sans SC";
      src: url("./fonts/Noto-Sans-SC/NotoSansSC-Thin.woff2") format("woff2");
      font-weight: 100;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: "Noto Sans SC";
      src: url("./fonts/Noto-Sans-SC/NotoSansSC-Light.woff2") format("woff2");
      font-weight: 300;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: "Noto Sans SC";
      src: url("./fonts/Noto-Sans-SC/NotoSansSC-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: "Noto Sans SC";
      src: url("./fonts/Noto-Sans-SC/NotoSansSC-Medium.woff2") format("woff2");
      font-weight: 500;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: "Noto Sans SC";
      src: url("./fonts/Noto-Sans-SC/NotoSansSC-Bold.woff2") format("woff2");
      font-weight: 600 700;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: "Noto Sans SC";
      src: url("./fonts/Noto-Sans-SC/NotoSansSC-Black.woff2") format("woff2");
      font-weight: 760 900;
      font-style: normal;
      font-display: block;
    }

    :root {
      --ui-bg: #111519;
      --stage-bg: #151a1f;
      --stage-grid: rgba(120, 132, 146, 0.18);
      --panel: #171c21;
      --panel-2: #20262d;
      --panel-3: #262d34;
      --field-bg: #101418;
      --field-bg-strong: #0b0e11;
      --ink: #edf0e8;
      --muted: #899098;
      --line: #313840;
      --line-strong: #4a525b;
      --accent: #f3a31a;
      --accent-2: #ffd35a;
      --accent-ink: #18120a;
      --accent-focus: rgba(243, 163, 26, 0.24);
      --accent-soft: rgba(243, 163, 26, 0.16);
      --dock-bg: rgba(23, 28, 33, 0.9);
      --shadow: rgba(0, 0, 0, 0.34);
      --app-height: 100vh;
      --canvas-fit-w: 720px;
      --poster-bg: #fffefa;
      --main-color: #1ab79a;
      --secondary-color: #111111;
      --poster-pad: 3.8%;
      --main-size: 30px;
      --main-latin-weight: 700;
      --main-cjk-weight: 700;
      --main-latin-stroke: 0px;
      --main-cjk-stroke: 0px;
      --cjk-size-scale: 0.88em;
      --cjk-baseline-shift: -0.055em;
      --main-tracking: 0em;
      --main-leading: 1;
      --main-align: left;
      --secondary-size: 10px;
      --secondary-tracking: 0em;
      --secondary-leading: 1.12;
      --secondary-align: left;
      --main-stroke-color: #ffffff;
      --image-scale: 1.18;
      --image-shift: -0.12em;
      --main-latin: Inter, sans-serif;
      --main-cjk: "Noto Sans SC", sans-serif;
    }

    body[data-ui-theme="light"] {
      --ui-bg: #eceee8;
      --stage-bg: #f3f2ec;
      --stage-grid: rgba(203, 205, 198, 0.38);
      --panel: #f8f9f5;
      --panel-2: #eef0eb;
      --panel-3: #e3e6df;
      --field-bg: #ffffff;
      --field-bg-strong: #fbfcf8;
      --ink: #151712;
      --muted: #676d64;
      --line: #cfd4cc;
      --line-strong: #aeb7aa;
      --accent: #e69112;
      --accent-2: #ffbe30;
      --accent-ink: #17120a;
      --accent-focus: rgba(230, 145, 18, 0.22);
      --accent-soft: rgba(230, 145, 18, 0.14);
      --dock-bg: rgba(255, 255, 255, 0.92);
      --shadow: rgba(28, 33, 24, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: var(--app-height);
      background: var(--ui-bg);
      color: var(--ink);
      font-family: Inter, "Noto Sans SC", sans-serif;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    input,
    select,
    textarea,
    button {
      font-family: inherit;
    }

    .app {
      --sidebar-width: 338px;
      --sidebar-offset: var(--sidebar-width);
      display: grid;
      grid-template-columns: var(--sidebar-offset) minmax(0, 1fr);
      min-height: var(--app-height);
      transition: grid-template-columns 180ms ease;
    }

    .app.sidebar-collapsed {
      --sidebar-offset: 0px;
    }

    .sidebar {
      grid-column: 1;
      width: var(--sidebar-width);
      height: var(--app-height);
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 14px 12px 18px;
      border-right: 1px solid var(--line);
      background: var(--panel);
      scrollbar-color: var(--line-strong) transparent;
      transition: transform 180ms ease;
      z-index: 40;
    }

    .app.sidebar-collapsed .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      max-width: min(var(--sidebar-width), calc(100vw - 18px));
      transform: translateX(-100%);
      pointer-events: none;
    }

    .app.sidebar-collapsed.sidebar-overlay-open .sidebar {
      transform: translateX(0);
      pointer-events: auto;
    }

    .sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      background: transparent;
      backdrop-filter: none;
    }

    .app.sidebar-collapsed.sidebar-overlay-open .sidebar-backdrop {
      display: block;
    }

    .app-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin: 0 0 14px;
      padding: 8px 0 13px;
      border-bottom: 1px solid var(--line);
      user-select: none;
      caret-color: transparent;
    }

    .header-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .app-title {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
      color: var(--ink);
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      white-space: nowrap;
      user-select: none;
      caret-color: transparent;
    }

    .app-title::before {
      content: "✦";
      color: #ffffff;
      font-size: 18px;
      line-height: 1;
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.28);
    }

    body[data-ui-theme="light"] .app-title::before {
      color: #111111;
      text-shadow: none;
    }

    .reset-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: auto;
      min-width: 74px;
      min-height: 34px;
      padding: 7px 11px;
      border-color: var(--line);
      border-radius: 9px;
      background: var(--field-bg-strong);
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .reset-button::before {
      content: "↻";
      font-size: 14px;
      line-height: 1;
    }

    .toolbar-toggle {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 30px;
      min-width: 30px;
      height: 30px;
      min-height: 30px;
      padding: 0;
      border-color: var(--line);
      border-radius: 8px;
      background: var(--field-bg-strong);
      color: var(--ink);
      user-select: none;
      caret-color: transparent;
    }

    .toolbar-toggle::before {
      content: none;
    }

    .toolbar-toggle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-left: 2.6px solid currentColor;
      border-bottom: 2.6px solid currentColor;
      border-radius: 1px;
      opacity: 0.86;
      transform: translate(-35%, -50%) rotate(45deg);
    }

    .toolbar-float-toggle::after {
      transform: translate(-65%, -50%) rotate(-135deg);
    }

    .toolbar-float-toggle {
      display: none;
      position: fixed;
      left: 14px;
      top: 14px;
      z-index: 35;
      background: var(--dock-bg);
      backdrop-filter: none;
      box-shadow: none;
    }

    .app.sidebar-collapsed:not(.sidebar-overlay-open) .toolbar-float-toggle {
      display: inline-grid;
    }

    .section {
      padding: 0;
      border-top: 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: 800;
      color: var(--ink);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .section-panel {
      border: 0;
      border-top: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      overflow: hidden;
      box-shadow: none;
    }

    .section:first-of-type .section-panel {
      border-top: 0;
    }

    .section-panel > summary {
      min-height: 50px;
      padding: 12px 4px;
      cursor: pointer;
      list-style: none;
      background: transparent;
    }

    .section-panel > summary.section-title {
      margin-bottom: 0;
    }

    .section-panel > summary::-webkit-details-marker {
      display: none;
    }

    .section-panel > summary::after {
      content: "▶";
      margin-left: auto;
      font-size: 7px;
      font-weight: 900;
      color: var(--muted);
    }

    .section-panel[open] > summary::after {
      content: "▼";
    }

    .section-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: rgba(230, 145, 18, 0.34);
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
    }

    .section-name {
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
      text-transform: none;
    }

    .section-body {
      padding: 2px 10px 11px;
    }

    label,
    .field {
      display: grid;
      gap: 5px;
      margin: 8px 0;
      font-size: 11px;
      font-weight: 760;
      color: var(--muted);
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: end;
    }

    .font-upload-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 32px;
      margin: 0;
      border-color: var(--line-strong);
      border-radius: 6px;
      background: var(--panel-3);
      color: var(--ink);
      font-size: 11px;
      font-weight: 800;
    }

    .font-upload-button::before {
      content: "↑";
      font-size: 15px;
      line-height: 1;
    }

    .color-field,
    .stroke-field {
      display: grid;
      gap: 7px;
      margin: 8px 0;
      min-width: 0;
      font-size: 11px;
      font-weight: 760;
      color: var(--muted);
    }

    .control-toggle {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr) 10px;
      gap: 7px;
      align-items: center;
      min-height: 30px;
      padding: 5px 7px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-align: left;
    }

    .control-toggle:hover,
    .control-toggle[aria-expanded="true"] {
      border-color: var(--line-strong);
      background: var(--field-bg-strong);
      color: var(--ink);
    }

    .control-toggle::after {
      content: "";
      justify-self: end;
      width: 5px;
      height: 5px;
      border-right: 1.6px solid currentColor;
      border-bottom: 1.6px solid currentColor;
      transform: rotate(45deg);
      transition: transform 0.16s ease;
    }

    .control-toggle[aria-expanded="true"]::after {
      transform: rotate(-135deg) translate(-1px, -1px);
    }

    .control-icon {
      position: relative;
      display: inline-grid;
      width: 16px;
      height: 16px;
      place-items: center;
      color: var(--muted);
      background: transparent;
    }

    .control-icon.color-icon::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--main-color);
    }

    .control-icon.stroke-icon::before {
      content: "";
      width: 14px;
      height: 12px;
      background:
        linear-gradient(currentColor, currentColor) 2px 0 / 2px 100% no-repeat,
        linear-gradient(currentColor, currentColor) 6px 0 / 2px 100% no-repeat,
        linear-gradient(currentColor, currentColor) 10px 0 / 2px 100% no-repeat;
      opacity: 0.9;
    }

    .control-panel {
      display: none;
      gap: 7px;
      min-width: 0;
      padding-right: 4px;
    }

    .color-field.is-open .control-panel,
    .stroke-field.is-open .control-panel {
      display: grid;
    }

    .color-control {
      display: grid;
      grid-template-columns: minmax(0, 72px) minmax(0, 1fr) minmax(0, 72px);
      gap: 7px;
      align-items: center;
      width: 100%;
      min-width: 0;
    }

    .color-mode,
    .color-random {
      min-height: 34px;
      border-radius: 8px;
      background: var(--panel-3);
      color: var(--ink);
    }

    .color-mode,
    .color-random {
      position: relative;
      min-width: 0;
      border-color: var(--line);
      font-size: 12px;
      overflow: hidden;
      padding-inline: 5px;
    }

    .color-mode::before,
    .color-mode::after,
    .color-random::before,
    .color-random::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 10px;
      height: 10px;
      border: 0;
      border-radius: 50%;
      transform: translateY(-50%);
      transition: background 0.16s ease;
    }

    .color-mode::before,
    .color-random::before {
      left: 6px;
      background: var(--color-back, #050505);
      z-index: 1;
    }

    .color-mode::after,
    .color-random::after {
      left: 12px;
      width: 15px;
      height: 15px;
      background: var(--color-front, #ffffff);
      z-index: 2;
    }

    .color-mode span,
    .color-random span {
      display: block;
      padding-left: 26px;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      white-space: nowrap;
    }

    .color-value {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      gap: 5px;
      align-items: center;
      min-height: 34px;
      min-width: 0;
      padding: 4px 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field-bg-strong);
    }

    .color-value input[type="color"] {
      width: 22px;
      height: 22px;
      padding: 0;
      border: 0;
      border-radius: 7px;
      background: transparent;
    }

    .color-hex {
      min-height: 24px;
      min-width: 0;
      padding: 2px 2px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: lowercase;
    }

    .stroke-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 82px;
      gap: 7px;
      align-items: center;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 82px;
      gap: 9px;
      align-items: center;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--field-bg);
      color: var(--ink);
      font: inherit;
      letter-spacing: 0;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-focus);
    }

    button:hover {
      border-color: var(--accent-2);
      background: var(--accent-2);
    }

    button.secondary:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--ink);
    }

    input,
    select {
      min-height: 32px;
      padding: 5px 8px;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position:
        calc(100% - 13px) 50%,
        calc(100% - 8px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 24px;
    }

    input[type="range"] {
      min-height: 26px;
      padding: 0;
      accent-color: var(--muted);
    }

    input[type="color"] {
      height: 32px;
      padding: 3px;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      padding: 8px;
      line-height: 1.35;
      scrollbar-color: var(--line-strong) transparent;
    }

    .compact textarea {
      min-height: 54px;
    }

    .footer-toggle {
      min-height: 32px;
    }

    .footer-text-fields {
      display: grid;
      gap: 8px;
      margin: 10px 0;
    }

    .footer-text-fields[hidden] {
      display: none;
    }

    .footer-settings {
      transition: opacity 0.16s ease;
    }

    .footer-settings.is-disabled {
      opacity: 0.42;
      pointer-events: none;
    }

    button {
      min-height: 32px;
      padding: 6px 9px;
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-ink);
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      transition: border-color 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    button.secondary {
      border-color: var(--line-strong);
      background: var(--panel-3);
      color: var(--ink);
    }

    button.is-active,
    .segmented button.is-active {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-ink);
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field-bg-strong);
      padding: 4px;
    }

    .segmented button {
      min-height: 30px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 0;
      display: inline-grid;
      place-items: center;
    }

    .segmented button.is-active {
      background: var(--panel-3);
      color: var(--muted);
      border-color: var(--line-strong);
      box-shadow: inset 0 0 0 1px var(--line-strong);
    }

    .alignment-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 98px;
      gap: 8px;
      align-items: end;
    }

    .random-letter-tool {
      display: grid;
      gap: 5px;
      margin: 8px 0;
      font-size: 11px;
      font-weight: 760;
      color: var(--muted);
    }

    .random-letter-tool button {
      min-height: 40px;
      border-color: var(--line);
      background: var(--field-bg-strong);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.05;
    }

    .export-scale-control {
      display: grid;
      gap: 7px;
      margin: 10px 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .export-scale-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .export-scale-options button {
      min-height: 32px;
      border-color: var(--line);
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
    }

    .export-scale-options button.is-active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-2);
    }

    body[data-ui-theme="light"] .export-scale-options button.is-active {
      color: #9b5e00;
    }

    .export-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .align-icon {
      display: grid;
      align-content: center;
      gap: 4px;
      width: 20px;
      height: 18px;
    }

    .align-icon span {
      display: block;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
    }

    .align-left span:nth-child(1),
    .align-left span:nth-child(3),
    .align-right span:nth-child(1),
    .align-right span:nth-child(3),
    .align-center span:nth-child(1),
    .align-center span:nth-child(3) {
      width: 68%;
    }

    .align-left span:nth-child(2),
    .align-right span:nth-child(2),
    .align-center span:nth-child(2),
    .align-justify span {
      width: 100%;
    }

    .align-left span,
    .align-justify span {
      justify-self: start;
    }

    .align-center span {
      justify-self: center;
    }

    .align-right span {
      justify-self: end;
    }

    .align-justify span {
      width: 100%;
    }

    .value {
      min-width: 54px;
      padding: 4px 5px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--field-bg-strong);
      text-align: center;
      font-size: 11px;
      color: var(--ink);
    }

      font-size: 14px;
      font-weight: 900;

      -webkit-appearance: none;

    .dock-unit {

      font-size: 13px;
      font-weight: 900;
    }

    .dock-select {
      width: 162px;
      min-height: 32px;

      border-radius: 11px;

      font-size: 14px;
      font-weight: 900;
      -webkit-appearance: none;

    .canvas-dock button {

      padding: 6px 8px;

      background: var(--panel-2);
      color: var(--ink);
      font-size: 13px;
      border-radius: 13px;

      position: relative;

      place-items: center;

      height: 40px;

      line-height: 1;
      color: currentColor;
    }

    body[data-ui-theme="light"] .theme-icon-button::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: currentColor;
      transform: translate(-50%, -50%);

    body[data-ui-theme="light"] .theme-icon-button::after {
      content: "";

      left: calc(50% + 7px);
      top: calc(50% - 3px);
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      transform: translate(-50%, -50%);

      gap: 7px;
      padding: 7px;

    body[data-ui-theme="light"] .dock-group {

    .poster-shell {

    }

    .poster {
      width: 100%;
      min-width: 40px;
      position: relative;
      aspect-ratio: var(--poster-ratio, 0.82);
      background: var(--poster-bg);

      display: grid;
      grid-template-rows: 1fr auto;
      padding: var(--poster-pad);
      overflow: hidden;

    .main-copy {
      min-height: 0;
      color: var(--main-color);
      font-family: var(--main-latin);
      font-size: var(--main-size);
      font-weight: var(--main-latin-weight);

      line-height: var(--main-leading);
      letter-spacing: var(--main-tracking);
      text-align: var(--main-align);
      word-break: normal;
      overflow-wrap: anywhere;
      hyphens: auto;
      line-break: loose;
    }

    .secondary-copy {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(18px, 6%, 64px);
      align-items: end;
      margin-top: 22px;
      color: var(--secondary-color);
      font-family: var(--main-latin);
      font-size: var(--secondary-size);
      font-weight: var(--main-latin-weight);

      paint-order: stroke fill;
      line-height: var(--secondary-leading);
      letter-spacing: var(--secondary-tracking);
      word-break: normal;
      overflow-wrap: anywhere;
      line-break: loose;
    }

    .poster.footer-hidden {
      grid-template-rows: 1fr;
    }

    .poster.footer-hidden .secondary-copy {

    }

    .secondary-copy > div {
      text-align: var(--secondary-align);
      min-width: 0;
    }

    .cjk-main {
      font-family: var(--main-cjk);
      position: relative;
      top: var(--cjk-baseline-shift);
      font-size: var(--cjk-size-scale);
      font-weight: var(--main-cjk-weight);
      -webkit-text-stroke: var(--main-cjk-stroke) var(--main-stroke-color);
      line-height: inherit;
      vertical-align: baseline;
    }

    .cjk-secondary {
      font-family: var(--main-cjk);
      position: relative;
      top: var(--cjk-baseline-shift);
      font-size: var(--cjk-size-scale);
      font-weight: var(--main-cjk-weight);
      -webkit-text-stroke: 0 currentColor;
      line-height: inherit;
      vertical-align: baseline;
    }

    .random-letter {
      display: inline-block;
      transform-origin: 50% 70%;
    }

    .image-token {
      display: inline-block;
      white-space: nowrap;
      break-inside: avoid;
      page-break-inside: avoid;
      word-break: keep-all;
      overflow-wrap: normal;
      line-height: inherit;
      vertical-align: baseline;
    }

    .inline-image {
      display: inline-flex;
      width: calc(1em * var(--image-scale));
      height: calc(1em * var(--image-scale) * 0.78);
      margin: 0 0.08em;
      vertical-align: var(--image-shift);
      align-items: center;
      justify-content: center;
    }

    .inline-image img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .empty-image {
      border: 2px dashed #b8bcb3;
      border-radius: 7px;
      color: #8b9087;
      font-size: 0.28em;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
      text-align: center;
      white-space: nowrap;
    }

    .paren {
      display: inline-block;
      font-size: 1.18em;
      line-height: 0;
      vertical-align: -0.02em;
      letter-spacing: 0;
    }

    .typewriter-unit {
      opacity: var(--typewriter-opacity, 1);
    }

    .image-token.typewriter-unit {
      display: inline-block;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: var(--sidebar-offset) minmax(0, 1fr);
      }

      .sidebar {
        height: var(--app-height);
        max-height: var(--app-height);
        border-right: 1px solid var(--line);

      }

      .stage-wrap {
        height: var(--app-height);
        min-height: var(--app-height);
        padding: 42px 16px 96px;
      }

      .canvas-dock {
        bottom: 14px;
        max-width: calc(100vw - 24px);
      }

      .poster-shell {
        width: min(var(--canvas-fit-w), 100%);
      }

      .poster {
        width: 100%;
      }
    }

    @media (max-width: 720px), (pointer: coarse) and (max-width: 1024px) {

      .sidebar {

      }

      .stage-wrap {

      }

      .canvas-dock {
        left: 50%;
        bottom: max(10px, env(safe-area-inset-bottom));
        width: calc(100vw - 20px);
        max-width: 420px;
        flex-wrap: wrap;
        gap: 5px;
        padding: 6px;
        border-radius: 14px;
      }

      .dock-group {
        min-height: 34px;
        padding: 4px 6px;
        gap: 4px;
        border-radius: 11px;
      }

      .dock-label,
      .dock-unit {
        font-size: 11px;
      }

      .dock-value {
        width: 54px;
        min-height: 29px;
        padding: 3px 6px;
        font-size: 12px;
      }

      .dock-select {
        width: 118px;
        min-height: 29px;
        font-size: 12px;
      }

      .canvas-dock button,
      .theme-icon-button {
        min-width: 34px;
        width: 34px;
        min-height: 34px;
        height: 34px;
        border-radius: 11px;
      }

      .poster-shell {
        max-width: calc(100vw - 24px);
      }
    }

    @media (max-width: 480px) {
      .control-grid {
        grid-template-columns: 1fr;

      .app-title {

      }

      .reset-button {

        min-height: 30px;
        padding: 6px 8px;
        font-size: 12px;
      }

      .canvas-dock {
        justify-content: center;
      }
    }
  </style>

  <script>
    const defaults = {
      mainText: "UTO IMAGE-TEXT LAYOUT TOOL { } / a live poster canvas for mixing type, icons, and found images []/ choose a folder and let every text marker become an inline visual interruption () / typography, image scale, color, rhythm, and spacing can be adjusted while the composition keeps reflowing { } / English copy leads the reading path, with Chinese annotation following as a second voice () / 自动图文排版工具用于生成海报、杂志式标题和图像夹注文本 { } / 你可以选择图片文件夹、随机替换图片、调整画布比例、字体粗细和导出文件 { } / the final canvas can be exported as PNG or PDF for poster tests, layout studies, and visual collections { } / 可以通过不同形式括号来嵌入图片{ }/()/Images can be embedded using different forms of brackets/ {}/[ ].",
      footerOne: "We look at all the different topics in the world from our perspective.\n从不同视角收集图像与文字。",
      footerTwo: "And we're collecting these themes and creating them in various new forms.\n让图文搭配生成新的版式。",
      footerThree: "/ Collected by Zonglin"
    };

    const els = Object.fromEntries(Array.from(document.querySelectorAll("[id]")).map((el) => [el.id, el]));
    const state = {
      imageItems: [],
      imageOrder: [],
      randomLetter: false,
      loadToken: 0,
      exportScale: 1,
      typewriterTimer: 0,
      typewriterFrame: 0,
      typewriterUnits: [],
      typewriterCompleted: false,
      footerVisible: true,
      sidebarUserCollapsed: false,
      sidebarOverlayOpen: false,
      touchDevice: false,
      customFontWeights: {
        latin: new Map(),
        cjk: new Map()
      },
      seed: Date.now()
    };
    const defaultWeightOptions = {
      latin: Array.from(els.mainLatinWeight.options).map((option) => ({
        value: option.value,
        label: option.textContent,
        selected: option.defaultSelected
      })),
      cjk: Array.from(els.mainCjkWeight.options).map((option) => ({
        value: option.value,
        label: option.textContent,
        selected: option.defaultSelected
      }))
    };

    function setVar(name, value) {
      document.documentElement.style.setProperty(name, value);
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function seeded(index, offset = 0) {
      const x = Math.sin(index * 999 + state.seed + offset) * 10000;
      return x - Math.floor(x);
    }

    function decoratePlainText(text, secondary = false) {
      const cjkClass = secondary ? "cjk-secondary" : "cjk-main";
      let html = "";
      let cjkRun = "";
      let charIndex = 0;
      const flushCjk = () => {
        if (cjkRun) {
          html += `<span class="${cjkClass}">${escapeHtml(cjkRun)}</span>`;
          cjkRun = "";
        }
      };

      for (const char of text) {
        if (/[\u3040-\u30ff\u3400-\u9fff\uf900-\ufaff]/.test(char)) {
          cjkRun += char;
          charIndex += 1;
          continue;
        }

        flushCjk();
        const safe = escapeHtml(char);
        if (!secondary && state.randomLetter && /[A-Za-z]/.test(char)) {
          const scale = (0.82 + seeded(charIndex, 11) * 0.44).toFixed(2);
          html += `<span class="random-letter" style="font-size:${scale}em">${safe}</span>`;
        } else {
          html += safe;
        }

        if (/[_/／、，。；：！？,.!?;:)-]/.test(char)) {
          html += "<wbr>";
        }
        charIndex += 1;
      }
      flushCjk();
      return html;
    }

    function decorateMultilineText(text, secondary = false) {
      return String(text || "").split(/\r?\n/).map((line) => decoratePlainText(line, secondary)).join("<br>");
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(seeded(i, 101) * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function rebuildImageOrder() {
      state.seed = Date.now();
      state.imageOrder = shuffle(state.imageItems);
    }

    function imageSlot(index, marker = "{ }") {
      const bracketMap = {
        "(": [ "(", ")" ],
        "（": [ "（", "）" ],
        "【": [ "【", "】" ],
        "[": [ "[", "]" ],
        "｛": [ "｛", "｝" ],
        "{": [ "{", "}" ]
      };
      const [open, close] = bracketMap[marker.trim()[0]] || [ "{", "}" ];
      const items = state.imageOrder.length ? state.imageOrder : state.imageItems;
      const item = items[index % Math.max(items.length, 1)];
      if (!item) {
        return `<span class="image-token"><span class="paren">${open}</span><span class="inline-image empty-image">IMG</span><span class="paren">${close}</span></span>`;
      }
      const useCutout = els.randomRemoveBg.checked && item.cutout && item.clearSubject && seeded(index, 701) > 0.34;
      const src = useCutout ? item.cutout : item.src;
      return `<span class="image-token"><span class="paren">${open}</span><span class="inline-image"><img src="${src}" alt=""></span><span class="paren">${close}</span></span>`;
    }

    function renderMain() {
      const imageMarkerPattern = /^(\{\s*\}|｛\s*｝|\(\s*\)|（\s*）|【\s*】|\[\s*\])$/;
      const parts = els.mainText.value.split(/(\{\s*\}|｛\s*｝|\(\s*\)|（\s*）|【\s*】|\[\s*\])/g);
      let slot = 0;
      els.mainCopy.innerHTML = parts.map((part) => {
        if (imageMarkerPattern.test(part)) {
          const markup = imageSlot(slot, part);
          slot += 1;
          return markup;
        }
        return decorateMultilineText(part);
      }).join("");
      refreshTypewriter();
    }

    function renderFooter() {
      els.footerOneOut.innerHTML = decorateMultilineText(els.footerOne.value, true);
      els.footerTwoOut.innerHTML = decorateMultilineText(els.footerTwo.value, true);
      els.footerThreeOut.innerHTML = decorateMultilineText(els.footerThree.value, true);
      refreshTypewriter();
    }

    function refreshTypewriter({ restart = false } = {}) {
      if (!els.typewriterToggle?.checked) {
        clearTypewriterTimer();
        disableTypewriter();
        return;
      }
      if (!restart) {
        clearTypewriterTimer();
        completeTypewriter();
        return;
      }
      startTypewriterAnimation();
    }

    function startTypewriterAnimation() {
      clearTypewriterTimer();
      const items = buildTypewriterUnits();
      const seconds = Math.max(0.2, Number(els.typewriterDuration?.value || 3));
      const startedAt = performance.now();

      const tick = (now) => {
        const progress = Math.min(1, (now - startedAt) / (seconds * 1000));
        setTypewriterUnitReveal(items, Math.floor(progress * items.length));
        if (progress < 1) {
          state.typewriterFrame = requestAnimationFrame(tick);
          return;
        }
        setTypewriterUnitReveal(items, items.length);
        state.typewriterTimer = window.setTimeout(() => {
          completeTypewriter();
          state.typewriterCompleted = true;
        }, 80);
      };
      setTypewriterUnitReveal(items, 0);
      state.typewriterFrame = requestAnimationFrame(tick);
    }

    function clearTypewriterTimer() {
      if (state.typewriterTimer) {
        window.clearTimeout(state.typewriterTimer);
        state.typewriterTimer = 0;
      }
      if (state.typewriterFrame) {
        window.cancelAnimationFrame(state.typewriterFrame);
        state.typewriterFrame = 0;
      }
    }

    function completeTypewriter() {
      setTypewriterUnitReveal(state.typewriterUnits, state.typewriterUnits.length);
      state.typewriterTimer = 0;
      state.typewriterFrame = 0;
    }

    function disableTypewriter() {
      cleanupTypewriterUnits();
      state.typewriterTimer = 0;
      state.typewriterFrame = 0;
      state.typewriterCompleted = false;
    }

    function closeCompletedTypewriter() {
      if (!state.typewriterCompleted || !els.typewriterToggle.checked) return;
      els.typewriterToggle.checked = false;
      disableTypewriter();
    }

    function handleControlInteraction(event) {
      const target = event.target;
      if (!(target instanceof Element)) return;
      if (target.closest("#exportMp4Bottom") || target.closest("#typewriterToggle")) return;
      if (!target.closest(".sidebar") && !target.closest(".canvas-dock")) return;
      closeCompletedTypewriter();
    }

    function getViewportHeight() {
      return Math.round(window.visualViewport?.height || window.innerHeight || document.documentElement.clientHeight || 0);
    }

    function updateViewportMetrics() {
      const height = Math.max(320, getViewportHeight());
      setVar("--app-height", `${height}px`);
      state.touchDevice = window.matchMedia?.("(pointer: coarse)")?.matches || navigator.maxTouchPoints > 0;
      document.body.classList.toggle("is-touch-device", state.touchDevice);
      document.body.classList.toggle("is-safari", /^((?!chrome|android).)*safari/i.test(navigator.userAgent));
      updateImagePickerMode();
      updateCanvasFit();
    }

    function supportsDirectoryPicker() {
      return "showDirectoryPicker" in window || "webkitdirectory" in document.createElement("input");
    }

    function prefersFilePicker() {
      return state.touchDevice || !supportsDirectoryPicker();
    }

    function updateImagePickerMode() {
      if (!els.pickFolder || !els.folderInput) return;
      const fileMode = prefersFilePicker();
      els.pickFolder.textContent = fileMode ? "选择图片" : "选择文件夹";
      els.pickFolder.title = fileMode ? "当前设备将打开多图片选择。" : "选择包含图片的文件夹。";
      els.folderInput.toggleAttribute("webkitdirectory", !fileMode);
      els.folderInput.multiple = true;
    }

    function buildTypewriterUnits() {
      cleanupTypewriterUnits();
      const roots = [els.mainCopy, document.querySelector(".secondary-copy")];
      const units = [];
      roots.forEach((root) => wrapTypewriterNode(root, units));
      state.typewriterUnits = units;
      return units;
    }

    function wrapTypewriterNode(node, units) {
      if (!node) return;
      if (node.nodeType === Node.ELEMENT_NODE && node.classList.contains("image-token")) {
        node.classList.add("typewriter-unit");
        node.style.setProperty("--typewriter-opacity", "0");
        units.push(node);
        return;
      }
      if (node.nodeType === Node.ELEMENT_NODE && node.classList.contains("typewriter-unit")) return;
      if (node.nodeType === Node.TEXT_NODE) {
        const fragment = document.createDocumentFragment();
        tokenizeTypewriterText(node.textContent || "").forEach((token) => {
          if (/^\s+$/.test(token)) {
            fragment.appendChild(document.createTextNode(token));
            return;
          }
          const span = document.createElement("span");
          span.className = "typewriter-unit";
          span.textContent = token;
          span.style.setProperty("--typewriter-opacity", "0");
          fragment.appendChild(span);
          units.push(span);
        });
        node.replaceWith(fragment);
        return;
      }
      Array.from(node.childNodes).forEach((child) => wrapTypewriterNode(child, units));
    }

    function tokenizeTypewriterText(text) {
      return text.match(/\s+|[A-Za-z0-9]+(?:['’-][A-Za-z0-9]+)*|[\u3040-\u30ff\u3400-\u9fff\uf900-\ufaff]|[^\s]/gu) || [];
    }

    function setTypewriterUnitReveal(units, visibleCount) {
      units.forEach((unit, index) => {
        unit.style.setProperty("--typewriter-opacity", index < visibleCount ? "1" : "0");
      });
    }

    function cleanupTypewriterUnits() {
      els.poster.querySelectorAll(".image-token.typewriter-unit").forEach((node) => {
        node.classList.remove("typewriter-unit");
        node.style.removeProperty("--typewriter-opacity");
      });
      els.poster.querySelectorAll("span.typewriter-unit").forEach((node) => {
        node.replaceWith(document.createTextNode(node.textContent || ""));
      });
      els.poster.normalize();
      state.typewriterUnits = [];
    }

    function bindRange(id, outputId, cssName, cssValue) {
      const input = els[id];
      const output = els[outputId];
      const update = () => {
        output.value = input.value;
        if (cssName && cssValue) setVar(cssName, cssValue(input.value));
      };
      const updateFromOutput = () => {
        const parsed = Number(output.value);
        if (!Number.isFinite(parsed)) return;
        const min = Number(input.min);
        const max = Number(input.max);
        const next = Math.min(max, Math.max(min, parsed));
        output.value = next;
        input.value = next;
        if (cssName && cssValue) setVar(cssName, cssValue(input.value));
      };
      input.addEventListener("input", update);
      output.addEventListener("change", updateFromOutput);
      output.addEventListener("keydown", (event) => {
        if (event.key === "Enter") output.blur();
      });
      update();
    }

    function bindSelect(id, cssName) {
      const input = els[id];
      const update = () => setVar(cssName, input.value);
      input.addEventListener("input", update);
      input.addEventListener("change", update);
      update();
    }

    function getWeightSelect(target) {
      return target === "cjk" ? els.mainCjkWeight : els.mainLatinWeight;
    }

    function getFontSelect(target) {
      return target === "cjk" ? els.mainCjk : els.mainLatin;
    }

    function getWeightCssName(target) {
      return target === "cjk" ? "--main-cjk-weight" : "--main-latin-weight";
    }

    function getWeightLabel(value, target) {
      if (target === "cjk") return value;
      const names = {
        100: "Thin",
        200: "ExtraLight",
        300: "Light",
        400: "Regular",
        500: "Medium",
        600: "SemiBold",
        700: "Bold",
        800: "ExtraBold",
        900: "Black"
      };
      return names[value] ? `${names[value]} ${value}` : value;
    }

    function pickClosestWeight(options, preferred) {
      const preferredNumber = Number(preferred) || 400;
      return options.reduce((best, option) => {
        const distance = Math.abs((Number(option.value) || 400) - preferredNumber);
        const bestDistance = Math.abs((Number(best.value) || 400) - preferredNumber);
        return distance < bestDistance ? option : best;
      }, options[0]);
    }

    function setWeightOptions(target, options, preferredValue) {
      const select = getWeightSelect(target);
      const normalized = options.length ? options : defaultWeightOptions[target];
      const current = preferredValue || select.value || "700";
      select.replaceChildren();
      normalized.forEach((item) => {
        const option = document.createElement("option");
        option.value = item.value;
        option.textContent = item.label;
        select.appendChild(option);
      });
      const match = normalized.find((item) => item.value === current) || pickClosestWeight(normalized, current);
      select.value = match?.value || normalized[0]?.value || "400";
      setVar(getWeightCssName(target), select.value);
    }

    function updateFontWeightOptions(target) {
      const fontValue = getFontSelect(target).value;
      const customOptions = state.customFontWeights[target].get(fontValue);
      setWeightOptions(target, customOptions || defaultWeightOptions[target]);
    }

    function quoteFontFamily(family) {
      return `"${String(family).replace(/\\/g, "\\\\").replace(/"/g, '\\"')}"`;
    }

    function normalizeFontFileName(fileName) {
      return String(fileName || "")
        .replace(/\.[^.]+$/, "")
        .replace(/\[[^\]]+\]/g, " ")
        .replace(/([a-z])([A-Z])/g, "$1 $2")
        .replace(/[._-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function inferFontFamily(fileName) {
      const cleaned = normalizeFontFileName(fileName)
        .replace(/\b(?:thin|hairline|extra\s*light|ultra\s*light|light|regular|book|normal|medium|semi\s*bold|demi\s*bold|bold|extra\s*bold|ultra\s*bold|black|heavy|italic|oblique|roman|variable\s*font|variable|static|vf|wght|opsz|wdth|100|200|300|400|500|600|700|800|900)\b/gi, " ")
        .replace(/\s+/g, " ")
        .trim();
      return cleaned || "Custom Font";
    }

    function inferFontWeight(fileName) {
      const name = normalizeFontFileName(fileName);
      const rules = [
        ["100", /\b(?:thin|hairline|100)\b/i],
        ["200", /\b(?:extra\s*light|ultra\s*light|200)\b/i],
        ["300", /\b(?:light|300)\b/i],
        ["500", /\b(?:medium|500)\b/i],
        ["600", /\b(?:semi\s*bold|demi\s*bold|600)\b/i],
        ["800", /\b(?:extra\s*bold|ultra\s*bold|800)\b/i],
        ["900", /\b(?:black|heavy|900)\b/i],
        ["700", /\b(?:bold|700)\b/i],
        ["400", /\b(?:regular|book|normal|400)\b/i]
      ];
      return (rules.find(([, pattern]) => pattern.test(name)) || ["400"])[0];
    }

    function inferFontStyle(fileName) {
      return /\b(?:italic|oblique)\b/i.test(normalizeFontFileName(fileName)) ? "italic" : "normal";
    }

    function appendFontOption(select, label, value) {
      let option = Array.from(select.options).find((item) => item.value === value);
      if (!option) {
        option = document.createElement("option");
        option.value = value;
        option.textContent = `自定义 / ${label}`;
        select.appendChild(option);
      }
      return option;
    }

    function addFontOption(select, label, value) {
      appendFontOption(select, label, value);
      select.value = value;
      select.dispatchEvent(new Event("input", { bubbles: true }));
      select.dispatchEvent(new Event("change", { bubbles: true }));
    }

    async function loadCustomFonts(files, target) {
      const fontFiles = files.filter((file) => /\.(ttf|otf|woff2?)$/i.test(file.name));
      if (!fontFiles.length) return;
      const isCjk = target === "cjk";
      const button = isCjk ? els.customCjkFontButton : els.customLatinFontButton;
      const input = isCjk ? els.customCjkFontInput : els.customLatinFontInput;
      const select = isCjk ? els.mainCjk : els.mainLatin;
      const fallback = isCjk ? '"Noto Sans SC", sans-serif' : "Inter, sans-serif";
      if (!("FontFace" in window)) {
        button.title = "当前浏览器不支持网页字体上传。";
        return;
      }

      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = "载入中";
      try {
        const loadedFamilies = new Map();
        const failed = [];
        for (const file of fontFiles) {
          const family = inferFontFamily(file.name);
          const weight = inferFontWeight(file.name);
          const style = inferFontStyle(file.name);
          try {
            const font = new FontFace(family, await file.arrayBuffer(), { weight, style, display: "swap" });
            await font.load();
            document.fonts.add(font);
            if (!loadedFamilies.has(family)) loadedFamilies.set(family, []);
            loadedFamilies.get(family).push({ weight, style });
          } catch (error) {
            failed.push(file.name);
            console.warn("Font load failed:", file.name, error);
          }
        }
        const loaded = Array.from(loadedFamilies.entries());
        if (!loaded.length) throw new Error("No valid font files loaded.");
        loaded.forEach(([family, faces], index) => {
          const fontValue = `${quoteFontFamily(family)}, ${fallback}`;
          const weightOptions = Array.from(new Set(faces.map((face) => face.weight)))
            .sort((a, b) => Number(a) - Number(b))
            .map((weight) => ({ value: weight, label: getWeightLabel(weight, target) }));
          state.customFontWeights[target].set(fontValue, weightOptions);
          if (index === loaded.length - 1) {
            addFontOption(select, family, fontValue);
            setWeightOptions(target, weightOptions);
          } else {
            appendFontOption(select, family, fontValue);
          }
        });
        button.title = `已载入：${loaded.map(([family, faces]) => `${family}（${faces.length}）`).join(" / ")}${failed.length ? `；${failed.length} 个文件失败` : ""}`;
      } catch (error) {
        console.error(error);
        button.title = "字体载入失败，请尝试 ttf、otf、woff 或 woff2 文件。";
      } finally {
        button.disabled = false;
        button.textContent = originalText;
        input.value = "";
      }
    }

    function updateTypographyCalibration() {
      setVar("--cjk-size-scale", "0.88em");
      setVar("--cjk-baseline-shift", "-0.055em");

    function normalizeHex(value, fallback = "#111111") {
      const raw = String(value || "").trim();
      if (/^#[0-9a-f]{6}$/i.test(raw)) return raw.toLowerCase();
      if (/^[0-9a-f]{6}$/i.test(raw)) return `#${raw.toLowerCase()}`;
      return fallback;
    }

    function updateColorMode(button, color) {
      const light = isWhiteLike(color);
      button.style.setProperty("--color-front", light ? "#ffffff" : "#050505");
      button.style.setProperty("--color-back", light ? "#050505" : "#ffffff");
      button.classList.toggle("is-light", light);
      button.classList.toggle("is-dark", !light);
    }

    function isWhiteLike(color) {
      return color.toLowerCase() === "#ffffff" || color.toLowerCase() === "#fffefa";
    }

    function updateRandomColorIcon(button, front, back) {
      button.style.setProperty("--color-front", front);
      button.style.setProperty("--color-back", back);
    }

    function bindColorControl({ colorId, hexId, modeId, randomId, cssName, lightRandom = false, onButtonUse = null }) {
      const colorInput = els[colorId];
      const hexInput = els[hexId];
      const modeButton = els[modeId];
      const randomButton = els[randomId];
      const randomIconBack = randomColor({ light: lightRandom });
      const randomIconFront = randomColor({ light: lightRandom });
      let previousRandomColor = randomIconFront;
      const apply = (value, { fromRandom = false, previousColor = previousRandomColor } = {}) => {
        const next = normalizeHex(value, colorInput.defaultValue);
        colorInput.value = next;
        hexInput.value = next;
        setVar(cssName, next);
        updateColorMode(modeButton, next);
        if (fromRandom) {
          updateRandomColorIcon(randomButton, next, previousColor);
          previousRandomColor = next;
        }
      };
      colorInput.addEventListener("input", () => apply(colorInput.value));
      hexInput.addEventListener("change", () => apply(hexInput.value));
      modeButton.addEventListener("click", () => {
        if (onButtonUse) onButtonUse();
        apply(isWhiteLike(colorInput.value) ? "#000000" : "#ffffff");
      });
      randomButton.addEventListener("click", () => {
        if (onButtonUse) onButtonUse();
        apply(randomColor({ light: lightRandom }), { fromRandom: true, previousColor: previousRandomColor });
      });
      updateRandomColorIcon(randomButton, randomIconFront, randomIconBack);
      apply(colorInput.value);
    }

    function setControlPanel(panel, toggle, open) {
      panel.classList.toggle("is-open", open);
      toggle.setAttribute("aria-expanded", String(open));
    }

    function bindControlPanel(panelId, toggleId, { onOpen = null } = {}) {
      const panel = els[panelId];
      const toggle = els[toggleId];
      if (!panel || !toggle) return;
      toggle.addEventListener("click", () => {
        const open = !panel.classList.contains("is-open");
        if (open && onOpen) onOpen();
        setControlPanel(panel, toggle, open);
      });
      setControlPanel(panel, toggle, false);
    }

    function bindStrokeControl() {
      const apply = () => {
        const width = Number(els.mainStrokeWidth.value) || 0;
        els.mainStrokeWidthValue.value = els.mainStrokeWidth.value;
        setVar("--main-latin-stroke", `${width}px`);
        setVar("--main-cjk-stroke", `${width}px`);
      };
      els.mainStrokeWidth.addEventListener("input", apply);
      els.mainStrokeWidthValue.addEventListener("change", () => {
        els.mainStrokeWidth.value = Math.min(8, Math.max(0, Number(els.mainStrokeWidthValue.value) || 0));
        apply();
      });
      apply();
    }

    function enableMainStroke() {
      if ((Number(els.mainStrokeWidth.value) || 0) <= 0) {
        els.mainStrokeWidth.value = "1";
        els.mainStrokeWidthValue.value = "1";
      }
      setVar("--main-latin-stroke", `${Number(els.mainStrokeWidth.value) || 0}px`);
      setVar("--main-cjk-stroke", `${Number(els.mainStrokeWidth.value) || 0}px`);
    }

    function randomColor({ light = false } = {}) {
      const hue = Math.floor(Math.random() * 360);
      const saturation = light ? 38 + Math.random() * 34 : 62 + Math.random() * 30;
      const lightness = light ? 82 + Math.random() * 12 : 16 + Math.random() * 36;
      return hslToHex(hue, saturation, lightness);
    }

    function hslToHex(h, s, l) {
      s /= 100;
      l /= 100;
      const k = (n) => (n + h / 30) % 12;
      const a = s * Math.min(l, 1 - l);
      const f = (n) => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
      return `#${[f(0), f(8), f(4)].map((x) => Math.round(255 * x).toString(16).padStart(2, "0")).join("")}`;
    }

    function bindAlignment(groupName, cssName) {
      const group = document.querySelector(`[data-align-group="${groupName}"]`);
      group.addEventListener("click", (event) => {

      els.app.classList.toggle("sidebar-collapsed", collapsed);

    function getCanvasRatio() {
      if (els.canvasRatio.value !== "custom") return Number(els.canvasRatio.value) || 1;
      const width = Number(els.canvasWidthDock.value) || 760;
      const height = Number(els.canvasHeightDock.value) || Math.round(width / 0.75);
      return Math.max(0.2, Math.min(4, width / height));
    }

    function setCanvasExportWidth(value) {
      const min = Number(els.canvasWidthDock.min);
      const max = Number(els.canvasWidthDock.max);
      const next = Math.round(Math.min(max, Math.max(min, Number(value) || min)));
      els.canvasWidthDock.value = next;
    }

    function syncCanvasMetrics({ fromHeight = false } = {}) {
      const ratio = getCanvasRatio();
      if (fromHeight) {
        setCanvasExportWidth((Number(els.canvasHeightDock.value) || 1013) * ratio);
      }
      const width = Number(els.canvasWidthDock.value) || 760;
      if (document.activeElement !== els.canvasHeightDock || !fromHeight) {
        els.canvasHeightDock.value = Math.round(width / ratio);
      }
      setVar("--poster-ratio", ratio);
      els.poster.style.aspectRatio = String(ratio);
      updateCanvasFit();
      updateExportSize();
    }

    function updateCanvasFit() {
      const stage = document.querySelector(".stage-wrap");
      const stageRect = stage.getBoundingClientRect();
      const { width, height } = getCanvasExportSize();
      const availableWidth = Math.max(100, stageRect.width - 112);
      const availableHeight = Math.max(100, stageRect.height - 168);
      const fitScale = Math.min(availableWidth / width, availableHeight / height);
      const previewScale = Math.max(0.1, Math.min(1, Number(els.canvasWidth.value) / 100 || 1));
      const fitWidth = Math.max(40, width * fitScale * previewScale);
      setVar("--canvas-fit-w", `${Math.round(fitWidth)}px`);
      centerStageView();
    }

    function getCanvasExportSize() {
      const width = Math.max(100, Math.round(Number(els.canvasWidthDock.value) || 760));
      const height = Math.max(100, Math.round(Number(els.canvasHeightDock.value) || Math.round(width / getCanvasRatio())));
      return { width, height };
    }

    function updateExportSize() {
      if (!els.exportSize) return;
      const { width, height } = getCanvasExportSize();
      const scale = state.exportScale || 1;
      els.exportSize.textContent = `输出：${width * scale} × ${height * scale} px`;
    }

    function centerStageView() {
      const stage = document.querySelector(".stage-wrap");
      requestAnimationFrame(() => {
        const maxLeft = stage.scrollWidth - stage.clientWidth;
        const maxTop = stage.scrollHeight - stage.clientHeight;
        stage.scrollLeft = maxLeft > 0 ? maxLeft / 2 : 0;
        stage.scrollTop = maxTop > 0 ? maxTop / 2 : 0;
      });
    }

    function resetDefaults() {

      document.querySelectorAll("input, select, textarea").forEach((control) => {
        if (control.type === "file") return;
        if (control.type === "checkbox") {
          control.checked = control.defaultChecked;
        } else if (control.tagName === "SELECT") {
          const selected = Array.from(control.options).findIndex((option) => option.defaultSelected);
          control.selectedIndex = selected >= 0 ? selected : 0;
        } else {
          control.value = control.defaultValue;
        }
        control.dispatchEvent(new Event("input"));
        control.dispatchEvent(new Event("change"));
      });
      state.resetting = false;
