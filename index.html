    els.folderInput.addEventListener("change", async () => {
      const files = Array.from(els.folderInput.files || []);
      const firstPath = files[0]?.webkitRelativePath?.split("/")[0] || (prefersFilePicker() ? "已选图片" : "已选文件夹");
      await loadImages(files, firstPath);
    });

    els.shuffleImages.addEventListener("click", () => {
      rebuildImageOrder();
      renderMain();
    });

    async function loadImages(files, folderName) {
      const token = state.loadToken + 1;
      state.loadToken = token;
      revokeImageUrls();
      const imageFiles = files.filter((file) => /^image\//.test(file.type) || /\.(png|jpe?g|gif|webp|avif|bmp|svg)$/i.test(file.name));
      if (!imageFiles.length) {
        els.folderStatus.textContent = "这个文件夹里没有识别到图片。";
        renderMain();
        return;
      }

      const neededCount = Math.min(imageFiles.length, Math.max(1, countImageMarkers(), 6));
      const orderedFiles = shuffle(imageFiles);
      const firstBatch = orderedFiles.slice(0, neededCount);
      const remaining = orderedFiles.slice(neededCount);
      els.folderStatus.textContent = `正在优先载入画面需要的 ${firstBatch.length} 张图片，共 ${imageFiles.length} 张。`;

      const firstItems = (await Promise.all(firstBatch.map(loadImageFileItem))).filter(Boolean);
      if (state.loadToken !== token) return;
      state.imageItems = firstItems;
      rebuildImageOrder();
      renderMain();
      updateFolderStatus(folderName, imageFiles.length, remaining.length);
      if (remaining.length) loadRemainingImages(remaining, folderName, imageFiles.length, token);
    }

    function countImageMarkers() {
      return (els.mainText.value.match(/\{\s*\}|｛\s*｝|\(\s*\)|（\s*）|【\s*】|\[\s*\]/g) || []).length;
    }

    async function loadImageFileItem(file) {
      try {
        const src = await fileToLayoutDataUrl(file);
        const cutoutData = await makeCutoutCandidate(src).catch(() => null);
        return {
          name: file.name,
          src,
          cutout: cutoutData?.url || "",
          clearSubject: Boolean(cutoutData?.clearSubject)
        };
      } catch (error) {
        return null;
      }
    }

    async function loadRemainingImages(files, folderName, totalCount, token) {
      const batchSize = 4;
      for (let index = 0; index < files.length; index += batchSize) {
        if (state.loadToken !== token) return;
        const before = state.imageOrder.length;
        const batch = files.slice(index, index + batchSize);
        const items = (await Promise.all(batch.map(loadImageFileItem))).filter(Boolean);
        if (state.loadToken !== token) return;
        if (items.length) {
          state.imageItems.push(...items);
          state.imageOrder.push(...shuffle(items));
          if (countImageMarkers() > before) renderMain();
        }
        updateFolderStatus(folderName, totalCount, files.length - index - batch.length);
        await new Promise((resolve) => requestAnimationFrame(resolve));
      }
      updateFolderStatus(folderName, totalCount, 0);
    }

    function updateFolderStatus(folderName, totalCount, remainingCount = 0) {
      const loadedCount = state.imageItems.length;
      const cutoutCount = state.imageItems.filter((item) => item.clearSubject).length;
      const loadingText = remainingCount > 0 ? `，后台继续载入 ${remainingCount} 张` : "";
      els.folderStatus.textContent = loadedCount
        ? `已载入 ${folderName} 中的 ${loadedCount}/${totalCount} 张图片，${cutoutCount} 张适合随机去背景${loadingText}。`
        : "正在读取图片，请稍候。";
    }

    function revokeImageUrls() {
      state.imageItems = [];
      state.imageOrder = [];
    }

    async function fileToLayoutDataUrl(file) {
      const dataUrl = await fileToDataUrl(file);
      if (/image\/svg\+xml|image\/gif/i.test(file.type)) return dataUrl;
      try {
        const img = await loadImage(dataUrl);
        const maxSide = 1200;
        const sourceMax = Math.max(img.naturalWidth, img.naturalHeight);
        if (sourceMax <= maxSide) return dataUrl;
        const scale = maxSide / sourceMax;
        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(img.naturalWidth * scale));
        canvas.height = Math.max(1, Math.round(img.naturalHeight * scale));
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL("image/png");
      } catch (error) {
        return dataUrl;
      }
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function makeCutoutCandidate(src) {
      const img = await loadImage(src);
      const maxSide = 1400;
      const scale = Math.min(1, maxSide / Math.max(img.naturalWidth, img.naturalHeight));
      const width = Math.max(1, Math.round(img.naturalWidth * scale));
      const height = Math.max(1, Math.round(img.naturalHeight * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(img, 0, 0, width, height);
      const image = ctx.getImageData(0, 0, width, height);
      const data = image.data;
      const bg = sampleBackground(data, width, height);
      if (!bg.clearSubject) return null;
      const threshold = bg.brightness > 220 ? 70 : 52;
      for (let i = 0; i < data.length; i += 4) {
        const distance = colorDistance(data[i], data[i + 1], data[i + 2], bg.r, bg.g, bg.b);
        if (distance < threshold) {
          data[i + 3] = 0;
        } else if (distance < threshold + 28) {
          data[i + 3] = Math.round(data[i + 3] * ((distance - threshold) / 28));
        }
      }
      ctx.putImageData(image, 0, 0);
      return { url: canvas.toDataURL("image/png"), clearSubject: true };
    }

    function sampleBackground(data, width, height) {
      const points = [];
      const size = Math.max(5, Math.round(Math.min(width, height) * 0.05));
      const zones = [
        [0, 0],
        [width - size, 0],
        [0, height - size],
        [width - size, height - size]
      ];
      zones.forEach(([x0, y0]) => {
        for (let y = y0; y < y0 + size; y += 2) {
          for (let x = x0; x < x0 + size; x += 2) {
            const i = (y * width + x) * 4;
            points.push([data[i], data[i + 1], data[i + 2]]);
          }
        }
      });
      const avg = points.reduce((acc, item) => [acc[0] + item[0], acc[1] + item[1], acc[2] + item[2]], [0, 0, 0]).map((v) => v / points.length);
      const variance = points.reduce((acc, item) => acc + colorDistance(item[0], item[1], item[2], avg[0], avg[1], avg[2]), 0) / points.length;
      const brightness = (avg[0] + avg[1] + avg[2]) / 3;
      return {
        r: avg[0],
        g: avg[1],
        b: avg[2],
        brightness,
        clearSubject: variance < 38 || brightness > 225
      };
    }

    function colorDistance(r1, g1, b1, r2, g2, b2) {
      return Math.hypot(r1 - r2, g1 - g2, b1 - b2);
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function collectDirectoryImages(dirHandle) {
      const files = [];
      for await (const entry of dirHandle.values()) {
        if (entry.kind === "file" && /\.(png|jpe?g|gif|webp|avif|bmp|svg)$/i.test(entry.name)) {
          files.push(await entry.getFile());
        }
        if (entry.kind === "directory") {
          files.push(...await collectDirectoryImages(entry));
        }
      }
      return files;
    }

    async function renderPosterCanvas() {
      return await renderPosterCanvasManual();
    }

    async function renderStaticPosterCanvas() {
      const shouldRestoreTypewriter = Boolean(els.typewriterToggle?.checked);
      clearTypewriterTimer();
      if (shouldRestoreTypewriter) {
        if (!state.typewriterUnits.length) buildTypewriterUnits();
        setTypewriterUnitReveal(state.typewriterUnits, state.typewriterUnits.length);
      }
      try {
        await waitForLayoutFrame();
        return await renderPosterCanvas();
      } finally {
        if (shouldRestoreTypewriter) {
          els.typewriterToggle.checked = true;
          completeTypewriter();
        }
      }
    }

    function waitForLayoutFrame() {
      return new Promise((resolve) => {
        requestAnimationFrame(() => requestAnimationFrame(resolve));
      });
    }

    async function renderPosterCanvasManual() {
      await waitForPosterAssets();

      const { width, height } = getCanvasExportSize();
      const exportScale = state.exportScale || 1;
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(width * exportScale);
      canvas.height = Math.round(height * exportScale);
      const ctx = canvas.getContext("2d");
      ctx.scale(exportScale, exportScale);
      const posterRect = els.poster.getBoundingClientRect();
      const correction = width / Math.max(1, posterRect.width);
      ctx.fillStyle = getComputedStyle(els.poster).backgroundColor;
      ctx.fillRect(0, 0, width, height);
      await drawPosterNode(ctx, els.poster, posterRect, correction);
      drawSecondaryCopy(ctx, posterRect, correction);
      return { canvas, width: canvas.width, height: canvas.height };
    }

    async function waitForPosterAssets() {
      if (document.fonts?.ready) await document.fonts.ready.catch(() => {});
      const images = Array.from(els.poster.querySelectorAll("img"));
      await Promise.all(images.map((img) => {
        if (img.complete) return img.decode ? img.decode().catch(() => {}) : true;
        return new Promise((resolve) => {
          img.addEventListener("load", resolve, { once: true });
          img.addEventListener("error", resolve, { once: true });
        });
      }));
    }

    async function drawPosterNode(ctx, root, posterRect, correction) {
      const nodes = collectDrawableNodes(root);
      for (const node of nodes) {
        if (node.nodeType === Node.TEXT_NODE) {
          drawTextNode(ctx, node, posterRect, correction);
        } else if (node.classList?.contains("image-token")) {
          await drawImageToken(ctx, node, posterRect, correction);
        } else if (node.tagName === "IMG") {
          await drawContainImage(ctx, node, posterRect, correction);
        } else if (node.classList?.contains("empty-image")) {
          drawEmptyImage(ctx, node, posterRect, correction);
        }
      }
    }

    function collectDrawableNodes(root) {
      const nodes = [];
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_ELEMENT | NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (node.nodeType === Node.TEXT_NODE) {
            if (node.parentElement?.closest(".secondary-copy")) return NodeFilter.FILTER_REJECT;
            if (node.parentElement?.closest(".image-token")) return NodeFilter.FILTER_REJECT;
            return node.textContent ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
          }
          if (node.closest?.(".secondary-copy")) return NodeFilter.FILTER_REJECT;
          if (node.classList?.contains("image-token")) return NodeFilter.FILTER_ACCEPT;
          if (node.closest?.(".image-token")) return NodeFilter.FILTER_REJECT;
          if (node.tagName === "IMG" || node.classList?.contains("empty-image")) {
            return NodeFilter.FILTER_ACCEPT;
          }
          return NodeFilter.FILTER_SKIP;
        }
      });
      while (walker.nextNode()) nodes.push(walker.currentNode);
      return nodes;
    }

    function drawTextNode(ctx, textNode, posterRect, correction) {
      const parent = textNode.parentElement;
      const style = getComputedStyle(parent);
      const text = textNode.textContent || "";
      if (!text) return;
      const opacity = getEffectiveOpacity(parent);
      if (opacity <= 0.01) return;
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.fillStyle = style.color;
      const fontSize = parseFloat(style.fontSize) || 16;
      const scaledFontSize = fontSize * correction;
      ctx.font = `${style.fontStyle} ${style.fontWeight} ${scaledFontSize}px ${style.fontFamily}`;
      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
      const strokeWidth = parseFloat(style.getPropertyValue("-webkit-text-stroke-width")) || 0;
      const range = document.createRange();
      splitTextNodeByDrawableRuns(text).forEach((segment) => {
        const segmentText = text.slice(segment.start, segment.end);
        if (!segmentText || /^\s+$/.test(segmentText)) return;
        const rects = getRangeRects(range, textNode, segment.start, segment.end);
        rects.forEach((rect) => {
          if (!rect.width && !rect.height) return;
          const x = (rect.left - posterRect.left) * correction;
          const y = getCanvasTextBaseline(ctx, rect, posterRect, correction, scaledFontSize);
          drawCanvasTextWithSpacing(ctx, segmentText, x, y, style, scaledFontSize, strokeWidth, correction);
        });
      });
      range.detach();
      ctx.restore();
    }

    function splitTextNodeByDrawableRuns(text) {
      const runs = [];
      const pattern = /\s+|[A-Za-z0-9]+(?:['’-][A-Za-z0-9]+)*|[\u3040-\u30ff\u3400-\u9fff\uf900-\ufaff]|[\uD800-\uDBFF][\uDC00-\uDFFF]|[^\s]/gu;
      let match;
      while ((match = pattern.exec(text || ""))) {
        const value = match[0];
        runs.push({ start: match.index, end: match.index + value.length });
      }
      return runs;
    }

    function getRangeRects(range, node, start, end) {
      range.setStart(node, start);
      range.setEnd(node, end);
      return Array.from(range.getClientRects()).filter((rect) => rect.width || rect.height);
    }

    function getCanvasTextBaseline(ctx, rect, posterRect, correction, fontSize) {
      const metrics = ctx.measureText("Hgjpqy");
      const descent = Number.isFinite(metrics.actualBoundingBoxDescent) ? metrics.actualBoundingBoxDescent : fontSize * 0.22;
      return (rect.bottom - posterRect.top) * correction - descent;
    }

    function drawCanvasTextWithSpacing(ctx, text, x, y, style, fontSize, strokeWidth, correction) {
      const letterSpacing = (parseFloat(style.letterSpacing) || 0) * correction;
      if (Math.abs(letterSpacing) < 0.001) {
        if (strokeWidth > 0) {
          ctx.lineWidth = strokeWidth * correction;
          ctx.strokeStyle = style.webkitTextStrokeColor || style.color;
          ctx.lineJoin = "round";
          ctx.strokeText(text, x, y);
        }
        ctx.fillText(text, x, y);
        return;
      }
      let cursor = x;
      for (const char of text) {
        if (char) {
          if (strokeWidth > 0) {
            ctx.lineWidth = strokeWidth * correction;
            ctx.strokeStyle = style.webkitTextStrokeColor || style.color;
            ctx.lineJoin = "round";
            ctx.strokeText(char, cursor, y);
          }
          ctx.fillText(char, cursor, y);
          cursor += ctx.measureText(char).width + letterSpacing;
        }
      }
    }

    function drawSecondaryCopy(ctx, posterRect, correction) {
      const footer = document.querySelector(".secondary-copy");
      if (!state.footerVisible || getComputedStyle(footer).display === "none") return;
      const style = getComputedStyle(footer);
      const columns = [
        { node: els.footerOneOut, source: els.footerOne.value },
        { node: els.footerTwoOut, source: els.footerTwo.value },
        { node: els.footerThreeOut, source: els.footerThree.value }
      ];
      ctx.save();
      ctx.fillStyle = style.color;
      ctx.textBaseline = "alphabetic";
      columns.forEach(({ node, source }) => {
        const rect = node.getBoundingClientRect();
        const nodeStyle = getComputedStyle(node);
        const x = (rect.left - posterRect.left) * correction;
        const y = (rect.top - posterRect.top) * correction;
        const width = rect.width * correction;
        drawSecondaryBlock(ctx, source, x, y, width, style, nodeStyle, correction);
      });
      ctx.restore();
    }

    function drawSecondaryBlock(ctx, text, x, y, width, style, nodeStyle, correction) {
      const fontSize = (parseFloat(style.fontSize) || 12) * correction;
      const lineHeight = fontSize * (parseFloat(style.lineHeight) / (parseFloat(style.fontSize) || 12) || 1.12);
      const letterSpacing = (parseFloat(style.letterSpacing) || 0) * correction;
      const align = nodeStyle.textAlign || style.textAlign || "left";
      let cursorY = y + getCanvasBaseline(ctx, fontSize, style.fontWeight, style.fontFamily);
      const paragraphs = String(text || "").split(/\n/);
      paragraphs.forEach((paragraph, paragraphIndex) => {
        const lines = wrapSecondaryLine(ctx, paragraph, width, fontSize, style, letterSpacing);
        lines.forEach((line) => {
          const lineWidth = measureRuns(ctx, line, fontSize, style, letterSpacing);
          const offset = align === "center" ? (width - lineWidth) / 2 : align === "right" || nodeStyle.justifySelf === "end" ? width - lineWidth : 0;
          drawRuns(ctx, line, x + Math.max(0, offset), cursorY, fontSize, style, letterSpacing);
          cursorY += lineHeight;
        });
        if (paragraphIndex < paragraphs.length - 1) cursorY += lineHeight * 0.08;
      });
    }

    function wrapSecondaryLine(ctx, text, maxWidth, fontSize, style, letterSpacing) {
      const tokens = tokenizeCanvasText(text);
      const lines = [];
      let line = [];
      tokens.forEach((token) => {
        const trial = line.concat(token);
        if (line.length && measureRuns(ctx, trial, fontSize, style, letterSpacing) > maxWidth) {
          lines.push(trimCanvasTokens(line));
          line = /^\s+$/.test(token.value) ? [] : [token];
        } else {
          line = trial;
        }
      });
      if (line.length) lines.push(trimCanvasTokens(line));
      return lines.filter((lineItems) => lineItems.length);
    }

    function tokenizeCanvasText(text) {
      const tokens = [];
      const pattern = /[A-Za-z0-9]+(?:['’-][A-Za-z0-9]+)*|\s+|[\u3040-\u30ff\u3400-\u9fff\uf900-\ufaff]|./gu;
      let match;
      while ((match = pattern.exec(text || ""))) {
        const value = match[0];
        if (/^[、，。；：！？,.!?;:%)]$/.test(value) && tokens.length && !/^\s+$/.test(tokens[tokens.length - 1].value)) {
          tokens[tokens.length - 1].value += value;
          continue;
        }
        tokens.push({ value, cjk: /[\u3040-\u30ff\u3400-\u9fff\uf900-\ufaff]/.test(value) });
      }
      return tokens;
    }

    function trimCanvasTokens(tokens) {
      let start = 0;
      let end = tokens.length;
      while (start < end && /^\s+$/.test(tokens[start].value)) start += 1;
      while (end > start && /^\s+$/.test(tokens[end - 1].value)) end -= 1;
      return tokens.slice(start, end);
    }

    function measureRuns(ctx, tokens, fontSize, style, letterSpacing) {
      return tokens.reduce((width, token, index) => {
        setCanvasTextFont(ctx, token.cjk, fontSize, style);
        return width + ctx.measureText(token.value).width + (index ? letterSpacing : 0);
      }, 0);
    }

    function drawRuns(ctx, tokens, x, y, fontSize, style, letterSpacing) {
      let cursorX = x;
      tokens.forEach((token, index) => {
        if (index) cursorX += letterSpacing;
        setCanvasTextFont(ctx, token.cjk, fontSize, style);
        ctx.fillText(token.value, cursorX, y);
        cursorX += ctx.measureText(token.value).width;
      });
    }

    function setCanvasTextFont(ctx, cjk, fontSize, style) {
      const family = cjk
        ? getComputedStyle(document.documentElement).getPropertyValue("--main-cjk").trim() || style.fontFamily
        : style.fontFamily;
      ctx.font = `${style.fontStyle} ${style.fontWeight} ${fontSize}px ${family}`;
    }

    function getCanvasBaseline(ctx, fontSize, weight, family) {
      ctx.font = `${weight} ${fontSize}px ${family}`;
      const metrics = ctx.measureText("Hg");
      const ascent = Number.isFinite(metrics.actualBoundingBoxAscent) ? metrics.actualBoundingBoxAscent : fontSize * 0.75;
      const descent = Number.isFinite(metrics.actualBoundingBoxDescent) ? metrics.actualBoundingBoxDescent : fontSize * 0.2;
      return (fontSize + ascent - descent) / 2;
    }

    async function drawImageToken(ctx, node, posterRect, correction) {
      const opacity = getEffectiveOpacity(node);
      if (opacity <= 0.01) return;
      const tokenRect = node.getBoundingClientRect();
      const lineStyle = getComputedStyle(node.parentElement || node);
      const lineFontSize = (parseFloat(lineStyle.fontSize) || 16) * correction;
      const baseline = getLineBaseline(ctx, tokenRect, posterRect, correction, lineFontSize, lineStyle);
      for (const child of Array.from(node.children)) {
        if (child.classList?.contains("paren")) {
          drawElementText(ctx, child, posterRect, correction, opacity, baseline);
        } else if (child.classList?.contains("empty-image")) {
          drawEmptyImage(ctx, child, posterRect, correction);
        } else if (child.classList?.contains("inline-image")) {
          const img = child.querySelector("img");
          if (img) await drawContainImage(ctx, img, posterRect, correction);
        }
      }
    }

    function getLineBaseline(ctx, rect, posterRect, correction, fontSize, style) {
      ctx.save();
      ctx.font = `${style.fontStyle} ${style.fontWeight} ${fontSize}px ${style.fontFamily}`;
      const baseline = getCanvasTextBaseline(ctx, rect, posterRect, correction, fontSize);
      ctx.restore();
      return baseline;
    }

    function drawElementText(ctx, node, posterRect, correction, parentOpacity = 1, forcedBaseline = null) {
      const text = node.textContent || "";
      if (!text) return;
      const rect = node.getBoundingClientRect();
      if (!rect.width && !rect.height) return;
      const style = getComputedStyle(node);
      const fontSize = parseFloat(style.fontSize) || 16;
      const scaledFontSize = fontSize * correction;
      const opacity = parentOpacity * getOwnOpacity(node);
      if (opacity <= 0.01) return;
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.fillStyle = style.color;
      ctx.font = `${style.fontStyle} ${style.fontWeight} ${scaledFontSize}px ${style.fontFamily}`;
      ctx.textAlign = "left";
      ctx.textBaseline = "alphabetic";
      const x = (rect.left - posterRect.left) * correction;
      const y = Number.isFinite(forcedBaseline)
        ? forcedBaseline
        : getCanvasElementBaseline(ctx, rect, posterRect, correction, scaledFontSize);
      drawCanvasTextWithSpacing(ctx, text, x, y, style, scaledFontSize, 0, correction);
      ctx.restore();
    }

    function getCanvasElementBaseline(ctx, rect, posterRect, correction, fontSize) {
      if (rect.height < 1) return (rect.bottom - posterRect.top) * correction;
      return getCanvasTextBaseline(ctx, rect, posterRect, correction, fontSize);
    }

    function getOwnOpacity(node) {
      const value = Number(getComputedStyle(node).opacity);
      return Number.isFinite(value) ? value : 1;
    }

    async function drawContainImage(ctx, img, posterRect, correction) {
      if (!img.complete) await new Promise((resolve) => {
        img.addEventListener("load", resolve, { once: true });
        img.addEventListener("error", resolve, { once: true });
      });
      if (!img.naturalWidth || !img.naturalHeight) return;
      const opacity = getEffectiveOpacity(img);
      if (opacity <= 0.01) return;
      const rect = img.getBoundingClientRect();
      const boxWidth = rect.width * correction;
      const boxHeight = rect.height * correction;
      const naturalRatio = (img.naturalWidth || rect.width) / (img.naturalHeight || rect.height);
      const boxRatio = boxWidth / boxHeight;
      let drawWidth = boxWidth;
      let drawHeight = boxHeight;
      if (naturalRatio > boxRatio) {
        drawHeight = boxWidth / naturalRatio;
      } else {
        drawWidth = boxHeight * naturalRatio;
      }
      const x = (rect.left - posterRect.left) * correction + (boxWidth - drawWidth) / 2;
      const y = (rect.top - posterRect.top) * correction + (boxHeight - drawHeight) / 2;
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.drawImage(img, x, y, drawWidth, drawHeight);
      ctx.restore();
    }

    function drawEmptyImage(ctx, node, posterRect, correction) {
      const opacity = getEffectiveOpacity(node);
      if (opacity <= 0.01) return;
      const rect = node.getBoundingClientRect();
      const style = getComputedStyle(node);
      const x = (rect.left - posterRect.left) * correction;
      const y = (rect.top - posterRect.top) * correction;
      const width = rect.width * correction;
      const height = rect.height * correction;
      ctx.save();
      ctx.globalAlpha = opacity;
      ctx.strokeStyle = style.borderTopColor;
      ctx.lineWidth = parseFloat(style.borderTopWidth) || 2;
      ctx.setLineDash([6, 5]);
      ctx.strokeRect(x, y, width, height);
      ctx.fillStyle = style.color;
      const fontSize = (parseFloat(style.fontSize) || 12) * correction;
      ctx.font = `${style.fontWeight} ${fontSize}px ${style.fontFamily}`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(node.textContent.trim(), x + width / 2, y + height / 2);
      ctx.restore();
    }

    function getEffectiveOpacity(node) {
      let opacity = 1;
      let current = node;
      while (current && current !== els.poster.parentElement) {
        if (current.nodeType === Node.ELEMENT_NODE) {
          const value = Number(getComputedStyle(current).opacity);
          if (Number.isFinite(value)) opacity *= value;
        }
        if (current === els.poster) break;
        current = current.parentElement;
      }
      return opacity;
    }

    async function exportPosterPng() {
      els.exportStatus.textContent = "正在生成 PNG。";
      try {
        const { canvas } = await renderStaticPosterCanvas();
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
        if (!blob) throw new Error("empty canvas");
        downloadBlob(blob, `图文自动排版工具-${new Date().toISOString().slice(0, 10)}.png`);
        els.exportStatus.textContent = "PNG 已生成。";
      } catch (error) {
        console.error(error);
        els.exportStatus.textContent = `PNG 导出失败：${getErrorMessage(error)}`;
      }
    }

    async function exportPosterPdf() {
      els.exportStatus.textContent = "正在生成 PDF。";
      try {
        const rendered = await renderStaticPosterCanvas();
        const jpegBlob = await new Promise((resolve) => rendered.canvas.toBlob(resolve, "image/jpeg", 0.96));
        if (!jpegBlob) throw new Error("empty jpeg");
        const pdfBlob = await makePdfFromJpeg(jpegBlob, rendered.canvas.width, rendered.canvas.height, rendered.width, rendered.height);
        downloadBlob(pdfBlob, `图文自动排版工具-${new Date().toISOString().slice(0, 10)}.pdf`);
        els.exportStatus.textContent = "PDF 已生成。";
      } catch (error) {
        console.error(error);
        els.exportStatus.textContent = `PDF 导出失败：${getErrorMessage(error)}`;
      }
    }

    async function exportPosterMp4() {
      if (!HTMLCanvasElement.prototype.captureStream || !window.MediaRecorder) {
        els.exportStatus.textContent = "视频导出失败：当前浏览器不支持画布录制。";
        return;
      }
      const mimeType = getSupportedVideoMime();
      if (!mimeType) {
        els.exportStatus.textContent = "视频导出失败：当前浏览器没有可用的视频编码器。";
        return;
      }

      const isMp4 = mimeType.includes("mp4");
      const fps = 24;
      const seconds = Math.max(0.5, Number(els.typewriterDuration?.value || 3));
      const frameCount = Math.max(2, Math.ceil(seconds * fps));
      const wasChecked = els.typewriterToggle.checked;
      let stream;
      const restoreTypewriterState = () => {
        if (wasChecked) {
          completeTypewriter();
          els.typewriterToggle.checked = true;
        } else {
          els.typewriterToggle.checked = false;
          disableTypewriter();
        }
      };

      els.exportStatus.textContent = isMp4 ? "正在录制 MP4 动画。" : "当前浏览器不支持 MP4 编码，正在录制 WebM 动画。";
      try {
        clearTypewriterTimer();
        cleanupTypewriterUnits();
        els.typewriterToggle.checked = true;
        const typewriterUnits = buildTypewriterUnits();
        const unitCount = typewriterUnits.length;
        setTypewriterUnitReveal(typewriterUnits, 0);

        const firstFrame = await renderPosterCanvas();
        const videoCanvas = document.createElement("canvas");
        videoCanvas.width = firstFrame.canvas.width;
        videoCanvas.height = firstFrame.canvas.height;
        const videoCtx = videoCanvas.getContext("2d");
        stream = videoCanvas.captureStream(fps);
        const chunks = [];
        const recorder = new MediaRecorder(stream, { mimeType });
        const stopped = new Promise((resolve) => {
          recorder.addEventListener("stop", resolve, { once: true });
        });
        recorder.addEventListener("dataavailable", (event) => {
          if (event.data?.size) chunks.push(event.data);
        });

        recorder.start();
        videoCtx.drawImage(firstFrame.canvas, 0, 0);
        stream.getVideoTracks()[0]?.requestFrame?.();
        for (let frame = 0; frame <= frameCount; frame += 1) {
          const visibleCount = Math.ceil((frame / frameCount) * unitCount);
          setTypewriterUnitReveal(typewriterUnits, visibleCount);
          const rendered = await renderPosterCanvas();
          videoCtx.clearRect(0, 0, videoCanvas.width, videoCanvas.height);
          videoCtx.drawImage(rendered.canvas, 0, 0);
          stream.getVideoTracks()[0]?.requestFrame?.();
          if (frame % Math.max(1, Math.round(fps / 3)) === 0) {
            els.exportStatus.textContent = `${isMp4 ? "MP4" : "WebM"} 录制中：${Math.round((frame / frameCount) * 100)}%。`;
          }
          await wait(1000 / fps);
        }

        setTypewriterUnitReveal(typewriterUnits, unitCount);
        const finalRendered = await renderPosterCanvas();
        videoCtx.clearRect(0, 0, videoCanvas.width, videoCanvas.height);
        videoCtx.drawImage(finalRendered.canvas, 0, 0);
        stream.getVideoTracks()[0]?.requestFrame?.();
        await wait(180);
        if (recorder.state === "recording" && recorder.requestData) recorder.requestData();
        recorder.stop();
        await stopped;
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
        restoreTypewriterState();

        const blob = new Blob(chunks, { type: mimeType });
        if (blob.size < 1024) throw new Error("empty video");
        const ext = isMp4 ? "mp4" : "webm";
        downloadBlob(blob, `图文自动排版工具-打字机动画-${new Date().toISOString().slice(0, 10)}.${ext}`);
        els.exportStatus.textContent = isMp4 ? "MP4 动画已生成。" : "浏览器不支持 MP4，本次已导出 WebM 动画。";
      } catch (error) {
        console.error(error);
        els.exportStatus.textContent = `视频导出失败：${getErrorMessage(error)}`;
        if (stream) stream.getTracks().forEach((track) => track.stop());
        restoreTypewriterState();
      }
    }

    function getErrorMessage(error) {
      const message = String(error?.message || error || "未知错误");
      if (/tainted/i.test(message)) return "浏览器安全策略阻止画布导出，已切换到安全渲染路径后请重试。";
      if (/empty video/i.test(message)) return "视频编码器没有生成有效数据，请换用最新版 Edge 或 Chrome。";
      if (/not supported|not allowed|mime|codec/i.test(message)) return "当前浏览器不支持这个导出能力，请换用最新版 Chrome 或 Edge。";
      return message.length > 64 ? `${message.slice(0, 64)}...` : message;
    }

    function getSupportedVideoMime() {
      return [
        "video/mp4;codecs=avc1.42E01E",
        "video/mp4",
        "video/webm;codecs=vp9",
        "video/webm;codecs=vp8",
        "video/webm"
      ].find((type) => MediaRecorder.isTypeSupported(type));
    }

    function wait(ms) {
      return new Promise((resolve) => window.setTimeout(resolve, ms));
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      if (!("download" in HTMLAnchorElement.prototype)) {
        window.open(url, "_blank", "noopener");
        setTimeout(() => URL.revokeObjectURL(url), 60000);
        return;
      }
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function makePdfFromJpeg(jpegBlob, imageWidth, imageHeight, pageWidth, pageHeight) {
      const imageBytes = new Uint8Array(await jpegBlob.arrayBuffer());
      const chunks = [];
      const offsets = [];
      let size = 0;
      const push = (part) => {
        const bytes = typeof part === "string" ? asciiBytes(part) : part;
        chunks.push(bytes);
        size += bytes.length;
      };
      const obj = (body) => {
        offsets.push(size);
        push(`${offsets.length} 0 obj\n${body}\nendobj\n`);
      };

      push("%PDF-1.4\n%auto-layout\n");
      obj("<< /Type /Catalog /Pages 2 0 R >>");
      obj("<< /Type /Pages /Kids [3 0 R] /Count 1 >>");
      obj(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth.toFixed(2)} ${pageHeight.toFixed(2)}] /Resources << /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>`);
      offsets.push(size);
      push(`4 0 obj\n<< /Type /XObject /Subtype /Image /Width ${imageWidth} /Height ${imageHeight} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imageBytes.length} >>\nstream\n`);
      push(imageBytes);
      push("\nendstream\nendobj\n");
      const content = `q\n${pageWidth.toFixed(2)} 0 0 ${pageHeight.toFixed(2)} 0 0 cm\n/Im0 Do\nQ\n`;
      obj(`<< /Length ${content.length} >>\nstream\n${content}endstream`);

      const xrefOffset = size;
      push(`xref\n0 ${offsets.length + 1}\n0000000000 65535 f \n`);
      offsets.forEach((offset) => push(`${String(offset).padStart(10, "0")} 00000 n \n`));
      push(`trailer\n<< /Size ${offsets.length + 1} /Root 1 0 R >>\nstartxref\n${xrefOffset}\n%%EOF`);
      return new Blob(chunks, { type: "application/pdf" });
    }

    function asciiBytes(text) {
      const bytes = new Uint8Array(text.length);
      for (let i = 0; i < text.length; i += 1) bytes[i] = text.charCodeAt(i) & 255;
      return bytes;
    }

    els.exportPngBottom.addEventListener("click", exportPosterPng);
    els.printPdfBottom.addEventListener("click", exportPosterPdf);
    els.exportMp4Bottom.addEventListener("click", exportPosterMp4);

    function bindCanvasPan() {
      const stage = document.querySelector(".stage-wrap");
      let active = false;
      let startX = 0;
      let startY = 0;
      let startLeft = 0;
      let startTop = 0;
      stage.addEventListener("mousedown", (event) => {
        if (event.button !== 1) return;
        event.preventDefault();
        active = true;
        startX = event.clientX;
        startY = event.clientY;
        startLeft = stage.scrollLeft;
        startTop = stage.scrollTop;
        stage.classList.add("is-panning");
      });
      window.addEventListener("mousemove", (event) => {
        if (!active) return;
        stage.scrollLeft = startLeft - (event.clientX - startX);
        stage.scrollTop = startTop - (event.clientY - startY);
      });
      window.addEventListener("mouseup", () => {
        active = false;
        stage.classList.remove("is-panning");
      });
      stage.addEventListener("auxclick", (event) => {
        if (event.button === 1) event.preventDefault();
      });
    }

    updateViewportMetrics();
    applyDefaults();
    applySidebarState();
    bindCanvasPan();
  </script>
</body>
</html>
